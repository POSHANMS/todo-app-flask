<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App - Login</title>

    <!-- Bootstrap 5 - makes everything look beautiful automatically -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Font Awesome - gives us beautiful icons -->
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <!-- Google Fonts - nicer text font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Our own custom CSS file -->
    <link
      href="{{ url_for('static', filename='css/style.css') }}"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Main wrapper - centers everything on screen -->
    <div class="auth-wrapper">
      <!-- The login card/box -->
      <div class="auth-card">
        <!-- Top section with icon and title -->
        <div class="auth-header">
          <div class="auth-icon">
            <i class="fas fa-check-double"></i>
          </div>
          <h2>Welcome Back</h2>
          <p>Sign in to manage your tasks</p>
        </div>

        <!-- Flash messages - shows errors or success messages from Flask -->
        {% with messages = get_flashed_messages(with_categories=true) %} {% if
        messages %} {% for category, message in messages %}
        <div
          class="alert alert-{{ category }} alert-dismissible fade show"
          role="alert"
        >
          {{ message }}
          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="alert"
          ></button>
        </div>
        {% endfor %} {% endif %} {% endwith %}

        <!-- Login Form -->
        <form method="POST" action="/login">
          <!-- Email input -->
          <div class="form-group mb-3">
            <label class="form-label">Email Address</label>
            <div class="input-group">
              <span class="input-group-text">
                <i class="fas fa-enelope"></i>
              </span>
              <input
                type="email"
                name="email"
                class="form-control"
                placeholder="Enter your email"
                required
              />
            </div>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
