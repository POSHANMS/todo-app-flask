<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App - My Tasks</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="{{ url_for('static', filename='css/style.css') }}"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="tasks-wrapper">
      <!-- Navbar - top navigation bar -->
      <nav class="navbar navbar-expand-lg">
        <div class="container">
          <!-- Logo on left side -->
          <a class="navbar-brand" href="/tasks">
            <i class="fas fa-check-double"></i>
            Todo app
          </a>
          <!-- Right side - username and logout -->
          <div class="ms-auto d-flex align-items-center gap-3">
            <!-- Show logged in username -->
            <span class="text-white">
              <i class="fas fa-user-circle me-1"></i>
              {{ current_user.name }}
            </span>

            <!-- Logout button -->
            <a href="/logout" class="btn btn-light btn-sm">
              <i class="fas fa-sign-out-alt me-1"></i>
              Logout
            </a>
          </div>
        </div>
      </nav>

      <!-- Stats bar - shows task counts -->
      <div class="stats-bar">
        <div class="container">
          <div class="row text-center">
            <!-- Total tasks count -->
            <div class="col-4 stat-item">
              <div class="stat-number">{{ total_tasks }}</div>
              <div class="stat-label">Total Tasks</div>
            </div>

            <!-- Pending tasks count -->
            <div class="col-4 stat-item">
              <div class="stat-number">{{ pending_tasks }}</div>
              <div class="stat-label">Pending</div>
            </div>

            <!-- Completed tasks count -->
            <div class="col-4 stat-item">
              <div class="stat-number">{{ completed_tasks }}</div>
              <div class="stat-label">Completed</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Main content area -->
      <div class="container" mt-4>
        <!-- Top row - heading and add task button -->
        <div class="d-flex justify-content-between align-items-center mb-4">
          <!-- Page heading -->
          <h4 class="fw-bold text-dark">
            <i class="fas fa-tasks me-2"></i>My Tasks
          </h4>

          <!-- Add task button - opens modal -->
          <button
            class="btn-add-task"
            data-bs-toggle="modal"
            data-bs-target="#taskModal"
          >
            <i class="fas fa-plus me-2"></i>Add Task
          </button>
        </div>

        <!-- Two sections side by side on desktop -->
        <div class="row">
          <!-- Left side - Pending tasks -->
          <div class="col-lg-6 mb-4">
            <!-- Pending section title -->
            <div class="section-title">
              <i class="fas fa-clock text-warning"></i>
              Pending
              <span class="badge bg-warning text-dark"
                >{{ pending_tasks }}</span
              >
            </div>
          </div>

          <!-- Right side - Completed tasks -->
          <div class="col-lg-6 mb-4">
            <!-- Completed section title -->
            <div class="section-title">
              <i class="fas fa-check-circle text-success"></i>
              Completed
              <span class="badge bg-success">{{ completed_tasks }}</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
